# Redirect www to non-www (301 permanent)
if ($host = www.openzootcg.com) {
    return 301 https://openzootcg.com$request_uri;
}

# Bot detection for SEO handlers
set $is_bot "";
if ($http_user_agent ~* "(facebookexternalhit|Twitterbot|Discordbot|Slackbot|LinkedInBot|WhatsApp|TelegramBot|Applebot|Google.*snippet|bingbot|Googlebot|SkypeUriPreview|redditbot|Meta-ExternalAgent)") {
    set $is_bot "1";
}

# Cache static assets
location /assets/ {
    expires 1y;
    add_header Cache-Control "public, immutable";
}

location /fonts/ {
    expires 1y;
    add_header Cache-Control "public, immutable";
}

location /models/ {
    expires 30d;
    add_header Cache-Control "public";
}

# Bare /gallery — serve SPA, bypass physical directory
location = /gallery  { try_files /index.html =404; }
location = /gallery/ { try_files /index.html =404; }

# Gallery card pages: bot → PHP SEO handler, non-bot → SPA
location ~ ^/gallery/(?!.*\.php)([^/?#]+)/?$ {
    if ($is_bot = "1") {
        rewrite ^/gallery/([^/?#]+)/?$ /gallery/index.php?cardId=$1 last;
    }
    try_files /index.html =404;
}

# Discord notify API
location = /api/notify {
    rewrite ^ /api/notify.php last;
}

# SPA catch-all fallback
location / {
    try_files $uri /index.html;
}
