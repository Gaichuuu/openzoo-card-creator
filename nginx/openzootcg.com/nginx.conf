# Redirect www to non-www (301 permanent)
if ($host = www.openzootcg.com) {
    return 301 https://openzootcg.com$request_uri;
}

# Cache static assets
location /assets/ {
    expires 1y;
    add_header Cache-Control "public, immutable";
}

location /fonts/ {
    expires 1y;
    add_header Cache-Control "public, immutable";
}

location /models/ {
    expires 30d;
    add_header Cache-Control "public";
}

# SPA catch-all fallback
location / {
    try_files $uri /index.html;
}
